<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Test</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

<div class="container bg-white p-4 rounded shadow-sm" style="max-width: 900px;">
  <h2 class="mb-4 text-dark">Create New Test</h2>

  <div class="mb-3">
    <label for="testName" class="form-label fw-semibold">Test Name:</label>
    <input type="text" class="form-control" id="testName" />
  </div>

  <div class="mb-3">
    <label for="duration" class="form-label fw-semibold">Duration (HH:mm:ss):</label>
    <input type="text" class="form-control" id="duration" placeholder="00:30:00" />
  </div>

  <div class="mb-3">
    <label for="createdDate" class="form-label fw-semibold">Created Date & Time:</label>
    <input type="datetime-local" class="form-control" id="createdDate" />
  </div>

  <div class="mb-3">
    <label for="passingLevel" class="form-label fw-semibold">Passing Level:</label>
    <input type="number" class="form-control" id="passingLevel" />
  </div>

  <div class="mb-3">
    <label for="subjectSelect" class="form-label fw-semibold">Subject:</label>
    <select class="form-select" id="subjectSelect">
      <option value="">-- Select Subject --</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold mt-3">Select Concepts</label>
    <div id="conceptContainer" class="d-flex flex-wrap gap-2"></div>
  </div>

  <h4 class="mt-3">Select Difficulty Level</h4>
<div id="difficultyGroup" class="d-flex flex-wrap gap-3 mb-3">
  <div class="form-check">
    <input type="radio" class="form-check-input" name="difficulty" value="Beginner" id="difficultyBeginner">
    <label class="form-check-label" for="difficultyBeginner">Beginner</label>
  </div>
  <div class="form-check">
    <input type="radio" class="form-check-input" name="difficulty" value="Intermediate" id="difficultyIntermediate">
    <label class="form-check-label" for="difficultyIntermediate">Intermediate</label>
  </div>
  <div class="form-check">
    <input type="radio" class="form-check-input" name="difficulty" value="Advanced" id="difficultyAdvanced">
    <label class="form-check-label" for="difficultyAdvanced">Advanced</label>
  </div>
  <div class="form-check">
    <input type="radio" class="form-check-input" name="difficulty" value="Expert" id="difficultyExpert">
    <label class="form-check-label" for="difficultyExpert">Expert</label>
  </div>
</div>

  <button id="loadQuestionsBtn" class="btn btn-primary mt-3" disabled>Load Questions</button>

  <h3 class="mt-4">Select Questions</h3>
  <div id="questionsList" class="list-group mb-3">
    <p class="text-muted fst-italic">Please select a subject to view questions.</p>
  </div>

  <button id="viewSelectedBtn" class="btn btn-primary mb-3" disabled>View Selected Questions</button>

  <div id="selectedQuestionsModal" class="mb-3">
    <h3>Selected Questions</h3>
    <div id="selectedQuestionsList"></div>
  </div>

  <button id="submitBtn" class="btn btn-success w-100">Create Test</button>
</div>

<script src="script/createTestJWT.js"></script>
</body>
</html>
