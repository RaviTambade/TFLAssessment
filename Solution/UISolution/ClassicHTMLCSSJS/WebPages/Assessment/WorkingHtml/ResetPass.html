<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
        background-color: #f2f2f2;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background-color: #2c3e50;
        color: white;
        padding: 20px;
    }

    .sidebar h3 {
        margin-bottom: 30px;
    }

    .sidebar a {
        display: block;
        color: white;
        text-decoration: none;
        margin: 15px 0;
    }

    .sidebar a:hover {
        text-decoration: underline;
    }

    /* Main section */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* Header */
    .header {
        background-color: #3b6ea5;
        color: white;
        padding: 10px 20px;
        text-align: right;
    }

    .logout-btn {
        background-color: red;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
    }

    /* Content - CENTERED */
    .content {
        flex: 1;
        display: flex;
        justify-content: center;   /* Horizontal center */
        align-items: center;       /* Vertical center */
    }

    /* Reset box */
    .reset-box {
        background-color: white;
        padding: 30px;
        width: 350px;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
        display: block;
        margin-top: 15px;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }

    .save-btn {
        margin-top: 20px;
        padding: 10px;
        width: 100%;
        background-color: #3b6ea5;
        color: white;
        border: none;
        cursor: pointer;
    }

    .save-btn:hover {
        background-color: #2f5c8a;
    }

    .message {
        margin-top: 15px;
        color: green;
        display: none;
    }

    .error {
        margin-top: 15px;
        color: red;
        display: none;
    }
</style>
</head>

<body>

<!-- Sidebar -->
<!-- <div class="sidebar">
    <h3>SME Panel</h3>
    <a href="#">Create Test</a>
    <a href="#">Get Questions via subjects and concepts</a>
    <a href="#">Your Profile</a>
</div> -->

<!-- Main -->
<div class="main">

    <!-- Header -->
  <!-- <div style="position: fixed; top: 0; right: 0; background: #2a76c1; color: white; padding: 10px 20px; z-index: 1; display: flex; align-items: center; gap: 10px;">
    Hello: <span id="userEmail"></span>
    <button id="logoutBtn" style="background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Logout</button>
  </div> -->

    <!-- Centered Content -->
    <div class="content">
        <div class="reset-box">
            <h2>Reset Password</h2>

            <label>Email:</label>
            <input type="text" id="email">

            <label>Old Password:</label>
            <input type="password" id="password">

            <label>New Password:</label>
            <input type="password" id="newPassword">

            <button class="save-btn" id="saveBtn">Save</button>

            <div class="message">Password updated successfully!</div>
            <div class="error"></div>
        </div>
    </div>

</div>

<script>
$(document).ready(function () {
    $("#saveBtn").click(function () {

        var email = $("#email").val();
        var oldpass = $("#password").val();
        var newpass = $("#newPassword").val();

        var emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/;

        if (!email || !oldpass || !newpass) {
            $(".error").text("Please fill in all fields.").show();
            $(".message").hide();
            return;
        }

        if (!email.match(emailPattern)) {
            $(".error").text("Please enter a valid email address.").show();
            $(".message").hide();
            return;
        }

        $.ajax({
            url: "http://localhost:5238/api/Auth/change-password",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({
                email: email,
                oldPassword: oldpass,
                newPassword: newpass
            }),
            success: function () {
                $(".message").show();
                $(".error").hide();
            },
            error: function (xhr) {
                $(".error").text(xhr.responseText || "Old password is incorrect.").show();
                $(".message").hide();
            }
        });

    });
});
</script>

</body>
</html>
