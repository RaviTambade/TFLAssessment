<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Style.css" />


</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100 p-5 my-5">

  <div class="card shadow mb-4 d-flex p-4" style="width:550px;   ">
    <h2 class="text-center mb-4 fs-5">User Registration</h2>


    <form id="registerForm">

      <div class="mb-3">
        <label for="aadharid" class="form-label fw-bold">Aadhar ID*</label>
        <input type="text" id="aadharid" name="aadharid" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="firstname" class="form-label fw-bold">First Name</label>
        <input type="text" id="firstname" name="firstname" class="form-control">
      </div>

      <div class="mb-3">
        <label for="lastname" class="form-label fw-bold">Last Name</label>
        <input type="text" id="lastname" name="lastname" class="form-control">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label fw-bold">Email</label>
        <input type="email" id="email" name="email" class="form-control">
      </div>

      <div class="mb-3">
        <label for="contactnumber" class="form-label fw-bold">Contact Number</label>
        <input type="text" id="contactnumber" name="contactnumber" maxlength="10" class="form-control">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-bold">Password</label>
        <input type="password" id="password" name="password" class="form-control">
      </div>

     <button type="submit" class="btn btn-orange w-100">Register</button>

      
    </form>
  </div>


  <script>
    document.getElementById("registerForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const userData = {
        aadharid: document.getElementById("aadharid").value,
        firstname: document.getElementById("firstname").value,
        lastname: document.getElementById("lastname").value,
        email: document.getElementById("email").value,
        contactnumber: document.getElementById("contactnumber").value,
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch("http://localhost:5238/api/Auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(userData)
        });

        if (response.ok) {
          const data = await response.json();
          alert("✅ Registration successful! Redirecting to login...");
          window.location.href = "loginJWT.html";
        } else {
          const errorData = await response.json();
          alert("❌ Registration failed: " + errorData.message);
        }

      } catch (error) {
        document.getElementById("message").innerText = "⚠️ Server error!";
        console.error(error);
      }

      console.log("User Registration Data:", userData);
    });
  </script>

</body>
</html>
